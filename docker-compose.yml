version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: bkk_gis_db
    environment:
      POSTGRES_DB: bkk_gis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bkk_gis"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: node:20-slim
    container_name: bkk_gis_app
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/bkk_gis
      - PORT=5174
      - NODE_ENV=development
    ports:
      - "5173:5173"
      - "5174:5174"
    command: sh -c "npm install && npm run dev"
    depends_on:
      db:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bkk_gis_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata:
